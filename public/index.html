<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Trading Desk</title>

<style>
body{
  background:#0f172a;
  color:#e2e8f0;
  font-family:Arial;
  padding:20px;
}

h2{
  margin-bottom:20px;
}

.box{
  background:#1e293b;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.logs{
  max-height:300px;
  overflow-y:auto;
  font-size:12px;
  background:#020617;
  padding:10px;
  border-radius:8px;
  font-family:monospace;
}

.log-entry{
  margin-bottom:4px;
  opacity:0.9;
}

.green{ color:#22c55e; }
.red{ color:#ef4444; }
.yellow{ color:#facc15; }
.blue{ color:#38bdf8; }

</style>
</head>

<body>

<h2>🏦 Trading Desk</h2>

<div class="box">
<h3>📊 Performance</h3>
<div id="perf">A carregar...</div>
</div>

<div class="box">
<h3>🤖 Bots</h3>
<div id="bots">A carregar...</div>
</div>

<div class="box">
<h3>📜 Logs (tempo real)</h3>
<div id="logs" class="logs">A carregar...</div>
</div>

<script>

function colorLog(line){

  if(line.includes('💰')) return `<div class="log-entry green">${line}</div>`;
  if(line.includes('❌') || line.includes('ERRO')) return `<div class="log-entry red">${line}</div>`;
  if(line.includes('⚠️')) return `<div class="log-entry yellow">${line}</div>`;
  if(line.includes('🎯') || line.includes('🗳️')) return `<div class="log-entry blue">${line}</div>`;

  return `<div class="log-entry">${line}</div>`;
}

async function load(){

 try{
  const r = await fetch('/api/cron');
  const d = await r.json();

  // ===== PERFORMANCE =====
  if(d.metrics){
    perf.innerHTML = `
      Trades: ${d.metrics.trades}<br>
      Winrate: ${d.metrics.winrate}%<br>
      PnL: ${d.metrics.pnl}<br>
      Equity: ${d.metrics.equity}<br>
      Drawdown: ${d.metrics.drawdown}%
    `;
  }

  // ===== BOTS =====
  if(d.bots){
    bots.innerHTML = Object.entries(d.bots)
      .map(([k,v])=>`
        ${k} → ${(v.capital*100).toFixed(1)}%
      `)
      .join('<br>');
  }

  // ===== LOGS =====
  if(d.logs && d.logs.length){
    logs.innerHTML = d.logs.map(colorLog).join('');

    // auto scroll para baixo
    logs.scrollTop = 0;
  } else {
    logs.innerHTML = 'Sem logs ainda...';
  }

 }catch(e){
  logs.innerHTML = 'Erro ao carregar dados...';
 }

}

// update contínuo
setInterval(load,5000);
load();

</script>

</body>
</html>
