<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Bot PRO</title>
<style>
body{background:#0f172a;color:#fff;font-family:Arial;padding:20px}
.box{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:10px}
</style>
</head>

<body>

<h2>🚀 Bot Control</h2>

<div class="box">
<h3>Settings</h3>

Risco % <input id="risk"><br>
Leverage <input id="lev"><br>

<button onclick="save()">Guardar</button>
</div>

<div class="box">
<h3>Métricas</h3>
<div id="metrics"></div>
</div>

<script>

async function load(){
 const r = await fetch('/api/bitget',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({action:'getSettings'})
 });

 const s = await r.json();

 risk.value=s.risk;
 lev.value=s.lev;
}

async function save(){
 await fetch('/api/bitget',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({
     action:'setSettings',
     risk:parseFloat(risk.value),
     lev:parseFloat(lev.value)
   })
 });

 alert('Atualizado');
}

load();

</script>

</body>
</html>
