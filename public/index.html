<!DOCTYPE html>
<html>
<head>
  <title>Trading Desk</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{background:#0f172a;color:white;font-family:Arial;margin:0}
    header{text-align:center;padding:15px;font-size:22px}
    .box{background:#1e293b;padding:15px;margin:10px;border-radius:10px}
    .btn{padding:10px;border:none;font-weight:bold;cursor:pointer}
    .on{background:#22c55e;color:black}
    .off{background:#ef4444;color:black}
    canvas{background:white;border-radius:10px}
    pre{font-size:12px;white-space:pre-wrap}
  </style>
</head>

<body>

<header>🤖 Trading Desk</header>

<div class="box">
  Estado: <span id="status">...</span><br><br>
  <button id="btn" class="btn" onclick="toggleBot()">...</button>
</div>

<div class="box">💰 Balance: <span id="balance">-</span></div>
<div class="box">📊 Winrate: <span id="winrate">-</span></div>

<div class="box">
  📈 Equity
  <canvas id="chart"></canvas>
</div>

<div class="box">
  📜 Trades
  <pre id="tradesData"></pre>
</div>

<div class="box">
  📊 Posições
  <pre id="positionsData"></pre>
</div>

<div class="box">
  📡 Logs (tempo real)
  <pre id="logsData"></pre>
</div>

<script>

let chart;
let lastRun = 0;

// ===== TOGGLE
async function toggleBot(){
  await fetch('/api/bitget',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'toggleBot'})
  });
}

// ===== LOAD (SIMPLIFICADO)
async function load(){

  try{

    // SETTINGS
    const s = await (await fetch('/api/bitget',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'getSettings'})
    })).json();

    const statusEl = document.getElementById('status');
    const btn = document.getElementById('btn');

    if(s.active){
      statusEl.innerText = 'ATIVO';
      statusEl.style.color = '#22c55e';
      btn.innerText = 'DESLIGAR BOT';
      btn.className = 'btn off';
    }else{
      statusEl.innerText = 'DESLIGADO';
      statusEl.style.color = '#ef4444';
      btn.innerText = 'LIGAR BOT';
      btn.className = 'btn on';
    }

    // 🔥 EXECUTA BOT CONTROLADO
    const now = Date.now();
    if(s.active && now - lastRun > 8000){
      lastRun = now;
      await fetch('/api/cron');
    }

    // BALANCE
    const bal = await (await fetch('/api/bitget',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'balance'})
    })).json();

    document.getElementById('balance').innerText =
      '$'+parseFloat(bal[0]?.available || 0).toFixed(2);

    // STATS
    const stats = await (await fetch('/api/stats')).json();

    document.getElementById('winrate').innerText =
      stats.winrate ? (stats.winrate*100).toFixed(2)+'%' : '0%';

    document.getElementById('tradesData').innerText =
      JSON.stringify(stats.trades || [], null, 2);

    const labels = (stats.equity || []).map(e =>
      new Date(e.time).toLocaleTimeString()
    );

    const data = (stats.equity || []).map(e => e.value);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById('chart'),{
      type:'line',
      data:{labels,datasets:[{label:'Equity',data}]}
    });

    // POSITIONS
    const pos = await (await fetch('/api/bitget',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'positions'})
    })).json();

    document.getElementById('positionsData').innerText =
      JSON.stringify(pos || [], null, 2);

    // LOGS (SEM EXECUTAR BOT)
    const logs = await (await fetch('/api/cron?mode=logs')).json();

    document.getElementById('logsData').innerText =
      (logs.logs || []).join('\n');

  }catch(e){
    console.log('ERROR:', e);
  }
}

setInterval(load,4000);

</script>

</body>
</html>
