<!DOCTYPE html>
<html>
<head>
<title>Trading Desk</title>
</head>
<body>

<h2>📊 Dashboard</h2>

<div id="logs"></div>
<div id="history"></div>
<div id="equity"></div>

<script>

async function load(){

  const stats = await (await fetch('/api/stats')).json();
  const cron = await (await fetch('/api/cron')).json();

  logs.innerHTML = cron.logs.join('<br>');

  history.innerHTML = stats.trades
    .map(t=>`${t.side} ${t.symbol}`)
    .join('<br>');

  equity.innerHTML = stats.equity
    .map(e=>e.value)
    .join(' → ');
}

setInterval(load,5000);
load();

</script>

</body>
</html>
