<!DOCTYPE html>
<html>
<head>
  <title>Bot Debug</title>

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      margin:0;
      padding:20px;
    }

    h2{
      text-align:center;
    }

    .box{
      background:#1e293b;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }

    button{
      padding:10px;
      font-weight:bold;
      cursor:pointer;
    }

    pre{
      white-space:pre-wrap;
      font-size:12px;
    }
  </style>
</head>

<body>

<h2>🤖 BOT DEBUG</h2>

<div class="box">
  Estado: <span id="status">...</span><br><br>
  <button onclick="toggleBot()">ON / OFF</button>
</div>

<div class="box">
  💰 Balance:
  <pre id="balance">loading...</pre>
</div>

<div class="box">
  📊 Posições:
  <pre id="positions">loading...</pre>
</div>

<div class="box">
  📡 Logs:
  <pre id="logs">loading...</pre>
</div>

<script>

// ===== TOGGLE
async function toggleBot(){
  try{
    await fetch('/api/bitget',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'toggleBot'})
    });
  }catch(e){
    console.log(e);
  }
}

// ===== LOAD
async function load(){

  try{

    // STATUS
    const s = await (await fetch('/api/bitget',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'getSettings'})
    })).json();

    document.getElementById('status').innerText =
      s.active ? 'ATIVO' : 'DESLIGADO';

    // BALANCE
    const bal = await (await fetch('/api/bitget',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'balance'})
    })).json();

    document.getElementById('balance').innerText =
      JSON.stringify(bal,null,2);

    // POSITIONS
    const pos = await (await fetch('/api/bitget',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'positions'})
    })).json();

    document.getElementById('positions').innerText =
      JSON.stringify(pos,null,2);

    // LOGS
    const logs = await (await fetch('/api/cron?mode=logs')).json();

    document.getElementById('logs').innerText =
      (logs.logs || []).join('\n');

  }catch(e){
    console.log('ERROR:', e);
  }
}

// LOOP
setInterval(load, 3000);
load();

</script>

</body>
</html>
