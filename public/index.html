<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Trading Desk</title>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;padding:20px}
.box{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:10px}
</style>
</head>

<body>

<h2>🏦 Trading Desk</h2>

<div class="box">
<h3>📊 Performance</h3>
<div id="perf"></div>
</div>

<div class="box">
<h3>🤖 Bots</h3>
<div id="bots"></div>
</div>

<script>

async function load(){

 const r = await fetch('/api/cron');
 const d = await r.json();

 if(d.metrics){
  perf.innerHTML = `
   Trades: ${d.metrics.trades}<br>
   Winrate: ${d.metrics.winrate}%<br>
   PnL: ${d.metrics.pnl}<br>
   Equity: ${d.metrics.equity}<br>
   Drawdown: ${d.metrics.drawdown}%
  `;
 }

 if(d.bots){
  bots.innerHTML = Object.entries(d.bots)
   .map(([k,v])=>`${k}: ${(v.capital*100).toFixed(1)}%`)
   .join('<br>');
 }

}

setInterval(load,5000);

</script>

</body>
</html>
