<!DOCTYPE html>
<html>
<head>
  <title>Trading Desk Pro</title>
  <style>
    body{font-family:Arial;background:#0f172a;color:#e2e8f0;padding:20px}
    h1{color:#38bdf8}
    .box{background:#1e293b;padding:15px;margin:10px 0;border-radius:10px}
    .green{color:#22c55e}
    .red{color:#ef4444}
    pre{white-space:pre-wrap}
    button{padding:10px;background:#38bdf8;border:none;border-radius:5px;color:#000;font-weight:bold}
  </style>
</head>
<body>

<h1>🤖 Trading Desk PRO</h1>

<div class="box">
  <button onclick="toggle()">ON / OFF BOT</button>
</div>

<div class="box">
  <h2>📡 Logs Inteligentes</h2>
  <pre id="logs"></pre>
</div>

<script>

async function fetchLogs(){
  const r=await fetch('/api/cron');
  const d=await r.json();

  document.getElementById('logs').innerText=d.logs.join('\n');
}

async function toggle(){
  await fetch('/api/bitget',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'toggleBot'})
  });
}

setInterval(fetchLogs,3000);

</script>

</body>
</html>
