<!DOCTYPE html>
<html>
<body>

<h2>Trading Desk</h2>

<button onclick="toggle()">ON/OFF</button>

<div id="logs"></div>
<div id="history"></div>
<div id="equity"></div>

<script>

async function toggle(){
  await fetch('/api/bitget',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'toggleBot'})
  });
}

async function load(){

  const stats = await (await fetch('/api/stats')).json();
  const cron = await (await fetch('/api/cron')).json();

  logs.innerHTML = cron.logs.join('<br>');

  history.innerHTML = stats.trades.map(t=>`${t.side} ${t.symbol}`).join('<br>');

  equity.innerHTML = stats.equity.map(e=>e.value).join(' → ');
}

setInterval(load,5000);
load();

</script>

</body>
</html>
