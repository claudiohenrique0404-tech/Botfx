<!DOCTYPE html>
<html>
<head>
  <title>Trading Bot</title>
</head>

<body style="background:#0f172a;color:white;font-family:Arial">

<h2>🤖 Trading Bot</h2>

<button onclick="toggleBot()" id="btn">...</button>

<h3>📡 Logs</h3>
<pre id="logs"></pre>

<script>

async function toggleBot(){
  await fetch('/api/core',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'toggleBot'})
  });
}

async function load(){

  // estado
  const s = await (await fetch('/api/core',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'getSettings'})
  })).json();

  document.getElementById('btn').innerText =
    s.active ? 'DESLIGAR BOT' : 'LIGAR BOT';

  // correr bot
  await fetch('/api/core',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'run'})
  });

  // logs
  const logs = await (await fetch('/api/core',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'logs'})
  })).json();

  document.getElementById('logs').innerText =
    logs.join('\n');
}

setInterval(load,3000);

</script>

</body>
</html>
