app = "botfx-worker"
primary_region = "mad"  # Madrid — mais próximo de Portugal

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 3000

[http_service]
  internal_port = 3000
  force_https = false
  auto_stop_machines = false   # CRÍTICO — impede o sleep
  auto_start_machines = true
  min_machines_running = 1     # sempre 1 instância viva

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
